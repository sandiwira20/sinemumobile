name: Flutter CI/CD

on:
  push:
    branches: [main]
  pull_request: # Tambahan dari dosen untuk trigger saat Pull Request

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: ☁️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.2" # Tetap pakai versi laptop Abang biar aman

      # --- INI DIA INTI PRAKTIKUM 5: CACHING DEPENDENCIES ---
      - name: 💾 Cache Flutter Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🧪 Run Tests
        run: flutter test
        continue-on-error: true # Tetap kebal error test

      - name: 🏗️ Build APK
        run: flutter build apk --release

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      # --- (Opsional: Create Release tetap saya biarkan agar rapi) ---
      - name: 🚀 Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📩 Send APK to Telegram
        if: success()
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument \
          -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -F document=@build/app/outputs/flutter-apk/app-release.apk \
          -F caption="✅ Praktikum 5 (Caching) Selesai! APK SiNemu berhasil di-build, Bang Tampan!"

      - name: ❌ Notify Failed
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ Build gagal Bang! Cek GitHub Actions."
